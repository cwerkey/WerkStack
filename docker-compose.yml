version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: werkstack
      POSTGRES_USER: werkstack
      POSTGRES_PASSWORD: werkstack_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werkstack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://werkstack:werkstack_dev@postgres:5432/werkstack
      JWT_SECRET: change_me_in_production
      # Set to your host IP or domain, e.g. http://192.168.1.50:5174
      FRONTEND_ORIGIN: http://localhost:5174
      # Set to 'true' only when serving over HTTPS
      COOKIE_SECURE: 'false'
    ports:
      - "3002:3001"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - backend

  frontend-v2:
    build:
      context: .
      dockerfile: frontend-v2/Dockerfile
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - backend

volumes:
  postgres_data:
